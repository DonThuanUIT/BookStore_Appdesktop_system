spring:
  profiles:
    active: local
  application:
    name: backend
  jackson:
    deserialization:
      fail-on-unknown-properties: true

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        default_batch_fetch_size: 50
        jdbc:
          batch_size: 30
        order_inserts: true
        order_updates: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:8080}
  jwt:
    secret: ${JWT_SECRET:bookstore-secret-key-for-jwt-signing-2026-safe}
    issuer: bookstore-backend
    expiration-minutes: 60
